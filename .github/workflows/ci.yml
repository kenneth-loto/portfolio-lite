name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome Check
        run: bun lint

      - name: Type Check
        run: bun typecheck

      - name: Build
        run: bun run build

      # Uncomment when you add tests
      # - name: Test
      #   run: bun test
