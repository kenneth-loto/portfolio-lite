name: CodeQL

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".gitattributes"
      - ".lintstagedrc.json"
      - ".zed/**"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".gitattributes"
      - ".lintstagedrc.json"
      - ".zed/**"
  schedule:
    - cron: "0 3 * * 1" # Every Monday 3AM UTC — catches new CVEs on existing code

permissions:
  contents: read
  security-events: write # required to upload SARIF results to the Security tab

jobs:
  analyze:
    name: CodeQL Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript # covers .js .ts .jsx .tsx
          queries: security-extended # ~300 security queries, more thorough than default

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile # needed so CodeQL can trace your dependency tree

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
